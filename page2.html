<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You, Jayati 💌</title>
<style>
body{
  background:linear-gradient(135deg,#ffb6c1,#fbc2eb);
  color:#fff;text-align:center;height:100vh;
  font-family:"Poppins",sans-serif;overflow:hidden;
}
h2{margin-top:10vh;font-size:2.5em;text-shadow:0 0 10px #fff;}
p{font-size:1.3em;margin-top:20px;}
button{
  background:#fff;color:#ff1493;border:none;border-radius:30px;
  padding:12px 35px;font-size:1.1em;cursor:pointer;margin:10px;
  transition:.3s;box-shadow:0 0 10px rgba(255,255,255,0.6);
}
button:hover{background:#ff69b4;color:#fff;transform:scale(1.1);}
.heart{font-size:3em;margin-top:25px;animation:heartbeat 1.5s infinite;}
.message{margin-top:20px;}
@keyframes heartbeat{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}
</style>
</head>
<body>
<h2>For You, Jayati 🌸</h2>
<p>
Your smile brightens every dull moment 💫<br>
Your eyes shine brighter than stars ✨<br>
Your voice… softer than the Titanic melody 🎶💞<br><br>
You’re truly one in a million ❤️
</p>
<div class="heart">💘💘💘</div>

<div class="message">
  <h3 style="margin-top:40px;">Will you go on a coffee date with me? ☕💖</h3>
  <div>
    <button onclick="alert('Yay! ☕ I’ll pick the spot 💞')">Yes 😍</button>
    <button id="noBtn" onmouseover="moveNo()">No 😜</button>
  </div>
</div>

<audio autoplay loop>
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/My%20Heart%20Will%20Go%20On.mp3" type="audio/mpeg">
</audio>

<script>
function moveNo(){
  const btn=document.getElementById("noBtn");
  const x=Math.random()*(window.innerWidth-150);
  const y=Math.random()*(window.innerHeight-100);
  btn.style.position="absolute";
  btn.style.left=`${x}px`;
  btn.style.top=`${y}px`;
}
</script>
</body>
</html>
